
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <style>
        body {
            background: #eef2f7;
            padding: 25px;
            font-family: Arial;
        }

        .container {
            max-width: 600px;
            background: white;
            padding: 30px;
            margin: auto;
            border-radius: 12px;
            text-align: center;
        }

        h2 {
            color: #2d89ef;
        }

        .otp-box {
            font-size: 28px;
            font-weight: bold;
            background: #f1f5ff;
            padding: 15px;
            border-radius: 8px;
            letter-spacing: 6px;
            margin: 20px auto;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Password Reset Request</h2>

        <p>Hello {{ name }},</p>

        <p>You requested to reset your password. Use the OTP code below:</p>

        <div class="otp-box">{{ otp }}</div>

        <p>This OTP is valid for <strong>10 minutes</strong>.</p>

        <p>If you did not request this, please ignore this email.</p>

        <div class="footer">
            © {{ year }} Vehicle Theft Detection System
        </div>
    </div>

</body>

</html>
